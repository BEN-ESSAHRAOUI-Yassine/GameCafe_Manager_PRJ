                        "inverse-primary": "#735c00",
                        "primary-fixed-dim": "#e9c349",

                        "tertiary": "#bfcdff",
                        "error": "#ffb4ab",
                        "secondary": "#c0c7cf",
                        "on-primary": "#3c2f00",
                        "secondary-container": "#40484e",
                        "primary-container": "#d4af37",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #131313;
        }
        h1, h2, h3 {
            font-family: 'Epilogue', sans-serif;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopNavBar -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-[#131313]/60 backdrop-blur-xl flex justify-between items-center w-full px-8 py-4 max-w-full mx-auto shadow-[0_40px_40px_rgba(233,195,73,0.08)]">
<div class="flex items-center gap-8">
<span class="text-2xl font-bold tracking-tighter text-[#d4af37] font-[Epilogue]">Aji L3bo Café</span>
<div class="hidden md:flex items-center gap-6">
<a class="text-neutral-400 font-medium hover:text-[#f2ca50] transition-colors duration-300" href="#">Dashboard</a>
<a class="text-neutral-400 font-medium hover:text-[#f2ca50] transition-colors duration-300" href="#">Bookings</a>
<a class="text-[#d4af37] border-b-2 border-[#d4af37] pb-1 font-bold transition-colors duration-300" href="#">Inventory</a>
<a class="text-neutral-400 font-medium hover:text-[#f2ca50] transition-colors duration-300" href="#">Members</a>
<a class="text-neutral-400 font-medium hover:text-[#f2ca50] transition-colors duration-300" href="#">Reports</a>
</div>
</div>
<div class="flex items-center gap-4">
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
<div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant">
<img alt="Admin Avatar" class="w-full h-full object-cover" data-alt="professional male portrait for admin avatar with clean lighting and blurred neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDAcniWG0K93lKvevwiJ4_V6EgAARjbjzSawmfDaUzh8nmcNdBF3WwBlXdjMtW11zFBtAgEfDuWKiIGNkD2sRFtm05eEF9fZgzaWaND38QQGnyKY7rXCehASkq6mvBcwndEFr4aTgMlyOIYVAzTkDpdhwTH7cbvnVPtLgThuVKhX-5b84j-1lf-Sow_99ccXzoais3itewFBTGP46FhCEeHWtbtiCW4NdJp0HWVMYhoIeaenVuubzCSAgzoGNsdbP3CE6aRJZymYhk"/>
</div>
</div>
</nav>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4">
<div class="w-full max-w-2xl bg-surface-container-low p-8 md:p-12 rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-outline-variant/10 relative overflow-hidden">
<!-- Decorative Accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary-container to-transparent opacity-50"></div>
<!-- Header -->
<div class="mb-10 text-center">
<h1 class="text-4xl font-extrabold tracking-tight text-on-background mb-2">Modifier le jeu</h1>
<p class="text-on-surface-variant font-medium tracking-wide">Mettre à jour les informations</p>
</div>
<!-- Pre-filled Form -->
<form class="space-y-6">
<!-- Game Name -->
<div>
<label class="block text-sm font-bold uppercase tracking-widest text-[#d4af37] mb-2 font-label">Nom du jeu</label>
<input class="w-full bg-surface-container-high border-none rounded-lg p-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all duration-300 outline-none placeholder:text-neutral-600" placeholder="Entrez le nom du jeu" type="text" value="Catan"/>
</div>
<!-- Category -->
<div>
<label class="block text-sm font-bold uppercase tracking-widest text-[#d4af37] mb-2 font-label">Catégorie</label>
<div class="relative">
<select class="w-full bg-surface-container-high border-none rounded-lg p-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all duration-300 appearance-none outline-none">
<option selected="" value="Strategie">Stratégie</option>
<option value="Famille">Famille</option>
<option value="Ambiance">Ambiance</option>
<option value="Experts">Experts</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-neutral-500">expand_more</span>
</div>
</div>
<!-- Description -->
<div>
<label class="block text-sm font-bold uppercase tracking-widest text-[#d4af37] mb-2 font-label">Description</label>
<textarea class="w-full bg-surface-container-high border-none rounded-lg p-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all duration-300 outline-none resize-none leading-relaxed" rows="4">Catan est un jeu de stratégie où les joueurs construisent des colonies, des routes et des villes pour dominer l'île de Catan.</textarea>
</div>
<!-- Numerical Fields Cluster -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Difficulty -->
<div>
<label class="block text-sm font-bold uppercase tracking-widest text-[#d4af37] mb-2 font-label">Difficulté</label>
<div class="flex items-center gap-4 bg-surface-container-high p-4 rounded-lg">
<input class="flex-grow accent-primary-container h-2 rounded-full cursor-pointer" max="5" min="1" type="range" value="4"/>
<span class="text-primary-container font-bold text-lg w-4">4</span>
</div>
</div>
<!-- Duration -->
<div>
<label class="block text-sm font-bold uppercase tracking-widest text-[#d4af37] mb-2 font-label">Durée estimée (minutes)</label>
<input class="w-full bg-surface-container-high border-none rounded-lg p-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all duration-300 outline-none" type="number" value="90"/>
</div>
</div>
<!-- Players side-by-side -->
<div class="grid grid-cols-2 gap-6">
<div>
<label class="block text-sm font-bold uppercase tracking-widest text-[#d4af37] mb-2 font-label">Joueurs min</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-lg p-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all duration-300 outline-none" type="number" value="2"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-neutral-500 text-sm">person</span>
</div>
</div>
<div>
<label class="block text-sm font-bold uppercase tracking-widest text-[#d4af37] mb-2 font-label">Joueurs max</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-lg p-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all duration-300 outline-none" type="number" value="4"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-neutral-500 text-sm">group</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-6 space-y-4">
<button class="w-full bg-primary-container text-on-primary-container font-bold py-4 px-6 rounded-lg hover:bg-primary transition-all duration-300 transform active:scale-95 shadow-lg flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined">save</span>
                        Enregistrer les modifications
                    </button>
<button class="w-full border-2 border-error text-error font-bold py-4 px-6 rounded-lg hover:bg-error/10 transition-all duration-300 transform active:scale-95 flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined">close</span>
                        Annuler
                    </button>
</div>
</form>
</div>
</main>
<!-- Footer -->
<footer class="bg-[#131313] mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center px-8 py-12 w-full gap-4">
<span class="font-[Manrope] text-xs uppercase tracking-widest text-neutral-500">© 2024 Aji L3bo Café. The Modern Alchemist Parlor.</span>
<div class="flex gap-8">
<a class="font-[Manrope] text-xs uppercase tracking-widest text-neutral-500 hover:text-neutral-200 transition-opacity" href="#">Support</a>
<a class="font-[Manrope] text-xs uppercase tracking-widest text-neutral-500 hover:text-neutral-200 transition-opacity" href="#">Terms</a>
<a class="font-[Manrope] text-xs uppercase tracking-widest text-neutral-500 hover:text-neutral-200 transition-opacity" href="#">Privacy</a>
</div>
</div>
</footer>
</body></html>
