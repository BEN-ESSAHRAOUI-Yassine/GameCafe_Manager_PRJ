<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #131313;
        }

            box-shadow: 0 40px 100px -20px rgba(233, 195, 73, 0.08);
        }
    </style>

<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar - Suppressed for transactional focus as per mandate -->
<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
<!-- Abstract background elements to represent "The Modern Alchemist" -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden opacity-20">
<div class="absolute -top-24 -left-24 w-96 h-96 rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-0 right-0 w-[500px] h-[500px] rounded-full bg-surface-tint/5 blur-[150px]"></div>
</div>
<!-- Registration Card Container -->
<div class="w-full max-w-lg z-10">
<div class="bg-surface-container-low rounded-xl editorial-shadow overflow-hidden p-8 md:p-12 border border-outline-variant/15">
<!-- Logo Area -->
<div class="text-center mb-10">
<h1 class="font-headline text-4xl font-extrabold text-primary tracking-tighter mb-2">
                        Aji L3bo 🎲
                    </h1>
<p class="font-body text-on-surface-variant tracking-wide opacity-80">
                        Créer un nouveau compte
                    </p>
</div>
<!-- Registration Form -->
<form action="#" class="space-y-6">
<!-- Name Field -->
<div class="space-y-2">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant/70 ml-1">Nom complet</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-lg py-4 px-5 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/50 transition-all outline-none" placeholder="Votre nom" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant/70 ml-1">Email</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-lg py-4 px-5 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/50 transition-all outline-none" placeholder="votre@email.com" type="email"/>
</div>
</div>
<!-- Phone Field -->
<div class="space-y-2">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant/70 ml-1">Téléphone</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-lg py-4 px-5 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/50 transition-all outline-none" placeholder="06 00 00 00 00" type="tel"/>
</div>
</div>
<!-- Password Fields Group -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant/70 ml-1">Mot de passe</label>
<input class="w-full bg-surface-container-high border-none rounded-lg py-4 px-5 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/50 transition-all outline-none" placeholder="Min. 8 caractères" type="password"/>
</div>
<div class="space-y-2">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant/70 ml-1">Confirmer</label>
<input class="w-full bg-surface-container-high border-none rounded-lg py-4 px-5 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/50 transition-all outline-none" placeholder="Confirmer" type="password"/>
</div>
</div>
<!-- Terms Checkbox (UX best practice addition) -->
<div class="flex items-center space-x-3 pt-2">
<input class="w-5 h-5 rounded border-none bg-surface-container-highest text-primary focus:ring-primary/50" id="terms" type="checkbox"/>
<label class="text-xs text-on-surface-variant leading-relaxed" for="terms">
                            J'accepte les conditions d'utilisation et la politique de confidentialité.
                        </label>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed font-headline font-bold text-lg rounded-lg shadow-xl shadow-primary/10 hover:shadow-primary/20 active:scale-[0.98] transition-all" type="submit">
                            S'inscrire
                        </button>
</div>
</form>
<!-- Redirect Link -->
<div class="mt-10 text-center">
<p class="font-body text-sm text-on-surface-variant">
                        Déjà un compte ? 
                        <a class="text-primary font-bold hover:text-surface-tint transition-colors ml-1" href="#">Se connecter</a>
</p>
</div>
</div>
<!-- Contextual Branding Image (Decorative) -->
<div class="mt-8 flex justify-center items-center gap-6 opacity-40 grayscale hover:grayscale-0 transition-all duration-700">
<img alt="Board pieces" class="w-12 h-12 rounded-full object-cover border border-outline-variant/30" data-alt="Close-up of premium wooden board game pieces on a dark velvet surface with warm ambient lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHoTv0gsXhd0iBgNA8rdBozYZU3odB1-Z1Re1s3LhU75NEAnzG9sqcPRncEJx-U6mZq2C32ZZbBZP55RHoWRzEQB54OXXCvP7ZOpj61yQJ4uJj8DrRZmiKpBzSvO2K-uidgs-DF1R8a9BbWQmyGvsDKuoKTeTrouXvchyl1LRBl2fqXDqWRl0qsFgGyVl88LE1u2pvt2fd1TRbm2r9uoGeunxFKmn4vQuPzRBcRuSkWCBw8z3a5Ecl8a_18EdjKYqFrNnMo3pVMUk"/>
<div class="h-px w-12 bg-outline-variant/30"></div>
<div class="material-symbols-outlined text-primary" data-icon="auto_awesome">auto_awesome</div>
<div class="h-px w-12 bg-outline-variant/30"></div>
<img alt="Cafe detail" class="w-12 h-12 rounded-full object-cover border border-outline-variant/30" data-alt="Luxury cafe interior detail with leather seating and warm localized lighting over a wooden table" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC77f7Pd7eyxiFUE8W_Ke_4kkmRI3RAPFeP1bUb_9ki5m8whphpdF873aPxPCIW9iSyuiRgW2y9RIZxEqrk8BQG9uUrLaAxRqmnuB4J0SqQKaHd17S0K749HujLXQiX3IZlLy2NtdY_X5Vg6KfXiQAibE0CE4O9NRbEZDvynObuJOQwkK1WJ4y8e0dBTbfZQsKO3Ogv2x9Dwl2wTNyCHfeg2S3yIY3LTnyhLQPP539l7cqF08oY23RYchATUmif5H_Qycu2JVTC_J0"/>
</div>
</div>
</main>
<!-- Footer - Simplified for registration flow -->
<footer class="w-full px-12 py-8 flex flex-col md:flex-row justify-between items-center gap-4 bg-surface-dim border-t border-outline-variant/10">
<p class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/50">
            © 2024 Aji L3bo Café. Crafted for Modern Alchemists.
        </p>
<div class="flex gap-6">
<a class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/50 hover:text-primary transition-colors" href="#">Aide</a>
<a class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/50 hover:text-primary transition-colors" href="#">Confidentialité</a>
</div>
</footer>
</body></html>
