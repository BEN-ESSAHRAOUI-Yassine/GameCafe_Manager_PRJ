<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aji L3bo Café - Ajouter un nouveau jeu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;800&amp;family=Manrope:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ffb4ab",
                        "secondary-fixed": "#dce3eb",
                        "primary-fixed-dim": "#e9c349",
                        "primary-fixed": "#ffe088",
                        "surface-tint": "#e9c349",
                        "inverse-primary": "#735c00",
                        "primary": "#f2ca50",
                        "outline": "#99907c",
                        "on-surface-variant": "#d0c5af",
                        "tertiary-fixed-dim": "#b4c5ff",
                        "primary-container": "#d4af37",
                        "on-secondary-container": "#afb6be",
                        "surface": "#131313",
                        "on-error": "#690005",
                        "error-container": "#93000a",
                        "on-primary-fixed-variant": "#574500",
                        "surface-container-lowest": "#0e0e0e",
                        "outline-variant": "#4d4635",
                        "on-secondary": "#2a3137",
                        "surface-bright": "#393939",
                        "on-secondary-fixed-variant": "#40484e",
                        "surface-variant": "#353534",
                        "surface-container-highest": "#353534",
                        "on-primary": "#3c2f00",
                        "tertiary-container": "#97b0ff",
                        "tertiary": "#bfcdff",
                        "secondary-container": "#40484e",
                        "surface-container-low": "#1c1b1b",
                        "on-tertiary-fixed": "#00174b",
                        "surface-dim": "#131313",
                        "surface-container": "#201f1f",
                        "secondary-fixed-dim": "#c0c7cf",
                        "surface-container-high": "#2a2a2a",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#dbe1ff",
                        "on-tertiary-container": "#254188",
                        "on-tertiary-fixed-variant": "#27438a",
                        "on-background": "#e5e2e1",
                        "secondary": "#c0c7cf",
                        "on-secondary-fixed": "#151c22",
                        "on-primary-container": "#554300",
                        "on-surface": "#e5e2e1",
                        "on-primary-fixed": "#241a00",
                        "inverse-surface": "#e5e2e1",
                        "on-tertiary": "#082b72",
                        "inverse-on-surface": "#313030",
                        "background": "#131313"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Epilogue"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- TopNavBar -->
<nav class="fixed top-0 w-full z-50 bg-neutral-950/60 backdrop-blur-xl shadow-[0_40px_0_0_rgba(233,195,73,0.08)]">
<div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
<div class="text-2xl font-bold tracking-tighter text-yellow-500 font-headline">Aji L3bo</div>
<div class="hidden md:flex items-center gap-8 font-headline tracking-tight">
<a class="text-neutral-400 hover:text-neutral-200 transition-colors" href="#">Jeux</a>
<a class="text-neutral-400 hover:text-neutral-200 transition-colors" href="#">Réservations</a>
<a class="text-yellow-500 border-b-2 border-yellow-500 pb-1" href="#">Dashboard</a>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-neutral-800/50 transition-all active:scale-95 duration-200 text-neutral-400">
<span class="material-symbols-outlined">logout</span>
</button>
</div>
</div>
</nav>
<main class="flex-grow pt-32 pb-20 px-6 flex flex-col items-center justify-center relative overflow-hidden">
<!-- Ambient Light Accents -->
<div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] -z-10 translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-surface-tint/5 rounded-full blur-[100px] -z-10 -translate-x-1/2 translate-y-1/2"></div>
<!-- Header Section -->
<div class="w-full max-w-2xl mb-10 text-center md:text-left">
<h1 class="text-4xl md:text-5xl font-extrabold font-headline text-on-surface tracking-tight mb-2">
                Ajouter un nouveau jeu
            </h1>
<p class="text-on-surface-variant font-body text-lg">
                Remplissez les informations du jeu
            </p>
</div>
<!-- Centered Form Card -->
<div class="w-full max-w-2xl bg-surface-container-low rounded-xl p-8 md:p-12 relative">
<!-- Ghost Border Accent -->
<div class="absolute inset-0 border border-outline-variant/15 rounded-xl pointer-events-none"></div>
<form class="space-y-8">
<!-- Field: Nom du jeu -->
<div class="space-y-2">
<label class="block text-sm font-semibold tracking-widest uppercase text-on-surface-variant font-label" for="game-name">
                        Nom du jeu
                    </label>
<input class="w-full bg-surface-container-high border-0 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3.5 text-on-surface placeholder:text-neutral-600 transition-all duration-200 font-body outline-none" id="game-name" placeholder="Ex: Catan" type="text"/>
</div>
<!-- Field: Catégorie -->
<div class="space-y-2">
<label class="block text-sm font-semibold tracking-widest uppercase text-on-surface-variant font-label" for="category">
                        Catégorie
                    </label>
<div class="relative">
<select class="w-full bg-surface-container-high border-0 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3.5 text-on-surface appearance-none transition-all duration-200 font-body outline-none cursor-pointer" id="category">
<option value="strategie">Stratégie</option>
<option value="ambiance">Ambiance</option>
<option value="famille">Famille</option>
<option value="experts">Experts</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
</div>
</div>
<!-- Field: Description -->
<div class="space-y-2">
<label class="block text-sm font-semibold tracking-widest uppercase text-on-surface-variant font-label" for="description">
                        Description
                    </label>
<textarea class="w-full bg-surface-container-high border-0 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3.5 text-on-surface placeholder:text-neutral-600 transition-all duration-200 font-body outline-none resize-none" id="description" placeholder="Décrivez le jeu en quelques phrases..." rows="4"></textarea>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Field: Difficulté -->
<div class="space-y-2">
<label class="block text-sm font-semibold tracking-widest uppercase text-on-surface-variant font-label" for="difficulty">
                            Difficulté (1 à 5)
                        </label>
<input class="w-full bg-surface-container-high border-0 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3.5 text-on-surface placeholder:text-neutral-600 transition-all duration-200 font-body outline-none" id="difficulty" max="5" min="1" placeholder="3" type="number"/>
</div>
<!-- Field: Durée -->
<div class="space-y-2">
<label class="block text-sm font-semibold tracking-widest uppercase text-on-surface-variant font-label" for="duration">
                            Durée estimée (minutes)
                        </label>
<input class="w-full bg-surface-container-high border-0 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3.5 text-on-surface placeholder:text-neutral-600 transition-all duration-200 font-body outline-none" id="duration" placeholder="60" type="number"/>
</div>
</div>
<!-- Row: Players Min/Max -->
<div class="grid grid-cols-2 gap-8">
<div class="space-y-2">
<label class="block text-sm font-semibold tracking-widest uppercase text-on-surface-variant font-label" for="players-min">
                            Joueurs min
                        </label>
<input class="w-full bg-surface-container-high border-0 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3.5 text-on-surface placeholder:text-neutral-600 transition-all duration-200 font-body outline-none" id="players-min" placeholder="2" type="number"/>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold tracking-widest uppercase text-on-surface-variant font-label" for="players-max">
                            Joueurs max
                        </label>
<input class="w-full bg-surface-container-high border-0 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3.5 text-on-surface placeholder:text-neutral-600 transition-all duration-200 font-body outline-none" id="players-max" placeholder="4" type="number"/>
</div>
</div>
<!-- Actions -->
<div class="pt-6 flex flex-col md:flex-row items-center gap-4">
<button class="w-full md:w-auto px-10 py-4 bg-primary text-on-primary font-bold rounded-lg hover:bg-primary-container transition-all active:scale-95 duration-200 shadow-xl shadow-primary/10" type="submit">
                        Ajouter le jeu
                    </button>
<button class="w-full md:w-auto px-10 py-4 bg-transparent text-neutral-400 font-bold rounded-lg border border-outline-variant/30 hover:border-neutral-200 hover:text-neutral-200 transition-all active:scale-95 duration-200" type="button">
                        Annuler
                    </button>
</div>
</form>
</div>
</main>
<!-- Footer -->
<footer class="bg-neutral-950 border-t border-neutral-800/15 w-full py-12 px-8 mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center gap-6 max-w-7xl mx-auto">
<div class="text-lg font-bold text-neutral-100">Aji L3bo Café</div>
<div class="flex gap-8">
<a class="text-neutral-500 font-['Manrope'] text-sm uppercase tracking-widest hover:text-yellow-400 transition-colors" href="#">Privacy</a>
<a class="text-neutral-500 font-['Manrope'] text-sm uppercase tracking-widest hover:text-yellow-400 transition-colors" href="#">Terms</a>
<a class="text-neutral-500 font-['Manrope'] text-sm uppercase tracking-widest hover:text-yellow-400 transition-colors" href="#">Contact</a>
</div>
<div class="text-neutral-500 font-['Manrope'] text-sm uppercase tracking-widest">
                © 2024 Aji L3bo Café. The Modern Alchemist.
            </div>
</div>
</footer>
</body></html>
